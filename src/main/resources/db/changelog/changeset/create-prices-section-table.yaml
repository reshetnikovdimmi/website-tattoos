databaseChangeLog:
  - changeSet:
      id: create-price-section-table
      author: Dmitrii
      changes:
        - createTable:
            tableName: price_section
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: image_name
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: plan_name
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: price
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: description
                  type: longtext character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: feature_1
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: feature_2
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: category_title
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: section
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci

  - changeSet:
      id: add-data-price
      author: Dmitrii
      changes:
        - insert:
            tableName: price_section
            columns:
              - column:
                  name: section
                  value: home
              - column:
                  name: description
                  value: description
              - column:
                  name: price
                  value: price
              - column:
                  name: category_title
                  value: category_title
        - insert:
            tableName: price_section
            columns:
              - column:
