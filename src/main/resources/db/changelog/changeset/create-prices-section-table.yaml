                  value: plan_name
              - column:
                  name: price
                  value: price
              - column:
                  name: description
                  value: description
              - column:
                  name: feature_1
                  value: feature_1
              - column:
                  name: feature_2
                  value: feature_2
        - insert:
            tableName: price_section
            columns:
              - column:
                  name: section
                  value: home
              - column:
                  name: plan_name
                  value: plan_name
              - column:
                  name: price
