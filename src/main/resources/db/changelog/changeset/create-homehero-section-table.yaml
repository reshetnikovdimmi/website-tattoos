databaseChangeLog:
  - changeSet:
      id: create-homehero-section-table
      author: Dmitrii
      changes:
        - createTable:
            tableName: home_hero_section
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: image_name
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: title
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: subtitle
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: description
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: section
                  type: varchar(255) character set utf8mb4 collate utf8mb4_unicode_ci
              - column:
                  name: display_order
                  type: int
                  defaultValueNumeric: 0
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true

  - changeSet:
      id: add-data-homehero
      author: Dmitrii
      changes:
        - insert:
            tableName: home_hero_section
            columns:
              - column:
                  name: section
                  value: home
              - column:
                  name: title
                  value: title
              - column:
                  name: subtitle
                  value: subtitle
              - column:
                  name: description
                  value: description
              - column:
                  name: display_order
                  valueNumeric: 1
              - column:
                  name: is_active
                  valueBoolean: true
  - changeSet:
      id: add-fk-from-homehero-to-home
      author: Dmitrii
      changes:
        - addForeignKeyConstraint:
            baseTableName: home_hero_section
            baseColumnNames: section
            referencedTableName: home
            referencedColumnNames: section
            constraintName: fk_home_hero_section_to_home