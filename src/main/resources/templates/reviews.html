<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:each="current: ${setting}"
      th:if="${current.section=='reviews-title'}">
    <meta charset="UTF-8">
    <meta name="description" th:content="${current.textH2}">
    <meta name="keywords" th:content="${current.textH2}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title th:text="${current.textH1}"></title>
    <link th:each="current: ${setting}" th:if="${current.section=='logo'}" th:href="@{'/images/'+${current.imageName}}"
          rel="icon" type="image/vnd.microsoft.icon">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css?family=Nunito+Sans:400,600,700,800,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Oswald:300,400,500,600,700&display=swap" rel="stylesheet">
    <!-- Css Styles -->

    <link rel="stylesheet" th:href="@{/static/css/bootstrap.min.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/static/css/font-awesome.min.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/static/css/elegant-icons.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/static/css/nice-select.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/static/css/owl.carousel.min.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/static/css/magnific-popup.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/static/css/slicknav.min.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/static/css/main.css}" type="text/css">
</head>

<body>
<!-- Page Preloder -->
<div id="preloder">
    <div class="loader"></div>
</div>

<!-- Header Section Begin -->
<div th:replace="~{fragments::header}"></div>
<!-- Header End -->
<div th:replace="~{fragments::modal}"></div>
<!-- Модальное окно End -->
<!-- Breadcrumb Section Begin -->
<section class="breadcrumb-section set-bg spad" th:each="current: ${setting}"
         th:if="${current.section=='breadcrumb'}" th:attr="data-setbg=@{'/images/'+${current.imageName}}">
    <div class="container">
        <div class="row">
            <div class="col-xl-7 col-lg-7 m-auto text-center">
                <div class="bs-hero-text">
                    <h2>Я делаю то, на что у других не хватает смелости.</h2>
                    <ul>
                        <li th:text="${#temporals.format(localDateTime, 'dd MMMM yyyy', new java.util.Locale('ru', 'RU'))}"></li>
                        <li th:text="${count} + ' ' + Отзывов"></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</section>
<!-- Breadcrumb End -->

<!-- Review Section Begin -->
<section class="blog-single-section spad">
    <div class="container">
        <div class="fragment-reviews">
            <div th:fragment="fragment-reviews">
                <!-- Заголовок секции -->
                <div class="section-title text-center mb-5">
                    <h2>Все отзывы</h2>
                    <p>Что говорят наши клиенты</p>
                </div>

                <!-- Таблица с отзывами -->
                <div class="classtime-table scroll">
                    <div th:replace="~{fragment-admin::blogreviews}"></div>
                </div>

                <!-- Форма добавления отзыва -->
                <div class="form-card">
                    <div class="form-card-header">
                        <i class="fa fa-pencil-square-o"></i>
                        <h4>Оставить отзыв</h4>
                    </div>

                        <div class="form-card-body">
                            <form onsubmit="submitForm(event)"
                                  enctype="multipart/form-data"
                                  data-fragment-name="fragment-reviews"
                                  data-container-selector=".fragment-reviews"
                                  th:object="${reviewsEntity}"
                                  action="/reviews/import">

                                <div class="form-group">
                                    <div class="form-two-columns">
                                        <!-- Левая колонка - загрузка изображения -->
                                        <div class="form-column-left">
                                            <div class="upload-area" onclick="showModals()">
                                                <div class="upload-placeholder" id="reviewPlaceholder">
                                                    <i class="fa fa-cloud-upload"></i>
                                                    <span>Выбрать изображение</span>
                                                </div>
                                                <img id="reviewImage" src="#" alt="Preview" class="upload-preview" style="display: none;">
                                                <input type="file" id="fileInput" style="display: none;">
                                            </div>
                                            <div class="upload-hint">
                                                <i class="fa fa-info-circle"></i>
                                                JPG, PNG, GIF, WEBP (макс. 5MB)
                                            </div>
                                        </div>

                                        <!-- Скрытое поле для имени изображения -->
                                        <input type="hidden" id="reviewImageName" name="imageName">

                                        <!-- Правая колонка - описание -->
                                        <div class="form-column-right">
                                            <label class="form-label">
                                                <i class="fa fa-align-left"></i>
                                                Описание
                                            </label>
                                            <textarea th:field="*{comment}"
                                                      placeholder="Ваш отзыв..."
                                                      id="Comment"
                                                      name="Comment"
                                                      required
                                                      class="form-textarea"
                                                      rows="5"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <!-- Кнопка отправки для авторизованных -->
                                <div sec:authorize="isAuthenticated()" class="text-center">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fa fa-paper-plane"></i>
                                        Отправить отзыв
                                    </button>
                                </div>

                                <!-- Блок для неавторизованных пользователей -->
                                <div sec:authorize="!isAuthenticated()" class="text-center">
                                    <a href="/login" class="btn btn-secondary">
                                        <i class="fa fa-sign-in"></i>
                                        Войти
                                    </a>
                                    <p class="form-note">
                                        <i class="fa fa-info-circle"></i>
                                        Комментарии могут оставлять только зарегистрированные пользователи.
                                    </p>
                                </div>
                            </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<!-- Review Section End -->

<!-- Cta Section Begin -->
<section class="cta-section">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="cta-text">
                    <h3>Сделай сегодня</h3>
                    <p>Индивидуальный эскиз</p>
                </div>
                <a href="/contact" class="primary-btn cta-btn">Записаться</a>
            </div>
        </div>
    </div>
</section>
<!-- Cta Section End -->

<!-- Footer Section Begin -->
<div class="footer-section">
    <div th:replace="~{fragments::footer}"></div>
</div>
<!-- Footer Section End -->

<!-- Js Plugins -->
<script type="text/javascript" th:src="@{/static/js/jquery-3.3.1.min.js}"></script>
<script type="text/javascript" th:src="@{/static/js/bootstrap.min.js}"></script>
<script type="text/javascript" th:src="@{/static/js/jquery.magnific-popup.min.js}"></script>
<script type="text/javascript" th:src="@{/static/js/mixitup.min.js}"></script>
<script type="text/javascript" th:src="@{/static/js/jquery.nice-select.min.js}"></script>
<script type="text/javascript" th:src="@{/static/js/jquery.slicknav.js}"></script>
<script type="text/javascript" th:src="@{/static/js/owl.carousel.min.js}"></script>
<script type="text/javascript" th:src="@{/static/js/masonry.pkgd.min.js}"></script>
<script type="text/javascript" th:src="@{/static/js/main.js}"></script>
</body>

</html>
